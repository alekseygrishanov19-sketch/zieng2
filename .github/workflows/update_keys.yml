name: Update VLESS Keys

on:
  schedule:
    - cron: '0 * * * *' # запуск в начале каждого часа
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run filter script
        env:
          RAW_URL: ${{ secrets.RAW_URL }}      # Рекомендуется хранить URL в Secret
          OUTPUT_FILE: filtered_vless_keys.txt
          FORBIDDEN_FLAG: "🇷🇺"
          MAX_CHECK: "100"
        run: python filter_keys.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add filtered_vless_keys.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: Filtered VLESS keys"
            git push
          fi
