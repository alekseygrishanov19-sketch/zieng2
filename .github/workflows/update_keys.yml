name: Update VLESS Keys

on:
  schedule:
    - cron: '0 * * * *'  # Запуск в начале каждого часа
  workflow_dispatch:      # Кнопка для ручного запуска

permissions:
  contents: write        # Разрешение на запись в репозиторий

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run filtering script
        run: python filter_keys.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add filtered_vless_keys.txt
          if git diff --staged --quiet; then
            echo "Изменений нет"
          else
            git commit -m "Auto-update: Filtered keys (removed RU flags)"
            git push
          fi

