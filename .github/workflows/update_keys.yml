name: Update VLESS Keys

on:
  schedule:
    - cron: '0 * * * *' # Строго раз в час
  workflow_dispatch:     # Кнопка для ручного запуска

permissions:
  contents: write       # Даем права на запись файлов в репозиторий

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run key filtering script
        run: python filter_keys.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add filtered_vless_keys.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: Filtered VLESS keys"
            git push
          fi
